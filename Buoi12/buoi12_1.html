<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="../slick-1.8.1/slick/slick.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="../slick-1.8.1/slick/slick-theme.css"
    />
    <style>
      .container {
        width: 200px;
        height: 200px;
        background-color: lightblue;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container:hover {
        animation: zoomOutDown 3s;
      }

      .slides {
        width: 80%;
        margin: 0 auto;
      }
      .card {
        width: 200px;
        height: 150px;
        background-color: lightcoral;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1 class="animate__animated animate__bounce">Hello, World!</h1>
    <div class="container">Hello, World!</div>

    <div class="slides">
      <div class="card">Slide 1</div>
      <div class="card">Slide 2</div>
      <div class="card">Slide 3</div>
      <div class="card">Slide 4</div>
      <div class="card">Slide 5</div>
      <div class="card">Slide 6</div>
    </div>

    <script src="https://code.jquery.com/jquery-1.11.0.min.js"></script>

    <script src="https://code.jquery.com/jquery-migrate-1.2.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <script>
      $(document).ready(function () {
        $(".slides").slick({
          infinite: true,
          slidesToShow: 3,
          slidesToScroll: 3,
          dots: true,
          arrows: true,
        });
      });
    </script>
  </body>
</html>
