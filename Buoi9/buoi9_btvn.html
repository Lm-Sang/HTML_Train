<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./buoi7_btvn.css" />
    <script
      src="https://kit.fontawesome.com/fa287fee30.js"
      crossorigin="anonymous"
    ></script>

    <style>
      html {
        font-size: 20px;
      }
      body {
        padding-left: 5%;
        padding-right: 5%;
      }
      p {
        margin: 0;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;

        position: fixed;
        top: 0;
        left: 0;
        right: 0;

        width: 100%;
        height: 80px;
        padding: 0 6%;

        background-color: white;
        box-sizing: border-box;
      }

      .header-left,
      .header-right {
        display: flex;
        align-items: center;
      }

      .header-right {
        gap: 25px;
      }
      #j-icon {
        font-size: 18px;
        color: white;
        align-content: center;
        border-radius: 3px;
        width: 40px;
        height: 40px;
        background-color: black;
      }

      .header-name {
        font-size: 22px;
        color: black;
        margin-left: 5px;
        transition: 0.5s ease;
      }

      #right-icon {
        font-size: 25px;
        color: orangered;
        margin-right: 20px;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-top: 8%;
      }

      .information {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-image {
        height: 300%;
        width: 45%;
      }
      .image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .info-content {
        display: flex;
        flex-direction: column;
        align-self: start;
        margin-top: 2%;
        width: 50%;
        box-sizing: border-box;
      }

      .stats {
        display: flex;
        justify-content: start;
        padding-left: 8%;
        gap: 8%;
      }
      .stat-number {
        font-size: 40px;
        font-weight: bold;
        color: orangered;
      }
      .stat-label {
        font-size: 25px;
        color: gray;
      }

      .about {
        margin-top: 40px;
      }
      .about-title {
        display: inline-block;
        font-size: 20px;
        font-weight: bold;
        color: black;
        border-bottom: 2px solid orangered;
        margin-top: 30px;
        margin-bottom: 10px;
      }
      .about-content {
        font-size: 130%;
        color: gray;
        margin-top: 10px;
        margin-bottom: 30px;
      }
      #btn {
        background-color: white;
        color: orangered;
        border: 2px solid orangered;
        padding: 12px 30px;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.5s ease;
      }

      #btn:focus {
        background-color: orangered;
        color: white;
      }

      .skills {
        display: flex;
        justify-content: space-between;
        margin-top: 50px;
      }
      .core-skills,
      .other-skills {
        width: 49%;
      }
      .skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        text-align: center;
        margin-top: 20px;
      }
      .skill-btn {
        background-color: white;
        color: black;
        border: 2px solid gray;
        padding: 12px 30px;
        border-radius: 25px;
        font-size: 14px;
      }

      .experience-title {
        margin-top: 40px;
        align-self: flex-start;
      }

      .experience {
        display: flex;
        justify-content: space-between;
      }
      .present,
      .pass {
        width: 49%;
      }
      .experience-duration {
        font-size: 18px;
        font-weight: bold;
        margin-top: 30px;
        margin-bottom: 8px;
      }
      .experience-company {
        font-size: 32px;
        margin-bottom: 8px;
      }
      .experience-job {
        font-size: 20px;
        margin-bottom: 25px;
      }
      .experience-list {
        color: gray;
        padding-left: 10px;
      }
      .experience-list li {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="skills">
      <div class="core-skills">
        <p class="about-title">CORE SKILLS</p>
        <div class="skill-list">
          <button class="skill-btn">JavaScript</button>
          <button class="skill-btn">Node.js</button>
          <button class="skill-btn">Express.js</button>
          <button class="skill-btn">MongoDB</button>
          <button class="skill-btn">Vue.js</button>
          <button class="skill-btn">React</button>
          <button class="skill-btn">Sequelize</button>
          <button class="skill-btn">GitHub</button>
          <button class="skill-btn">HTML</button>
        </div>
      </div>
      <div class="other-skills">
        <p class="about-title">OTHER SKILLS</p>
        <div class="skill-list">
          <button class="skill-btn">Storyblok</button>
          <button class="skill-btn">PWAs</button>
          <button class="skill-btn">Responsive Web Design</button>
          <button class="skill-btn">React</button>
          <button class="skill-btn">Vuetify</button>
        </div>
      </div>
    </div>

    <div style="margin-top: 30px">
      <input type="text" id="skillInput" />
      <button class="addButton">Add</button>
    </div>
    <div>
      <button class="coreButton">Core</button>
      <button class="otherButton">Other</button>
      <div class="categoryText">Add Core Skills</div>
    </div>

    <script src="buoi9_btvn.js"></script>
  </body>
</html>
