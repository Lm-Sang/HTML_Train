<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOOTSTRAP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Container (mô tả): căn giữa -->
    <div class="container">Nội dung</div>
    <br />
    <!-- Container Fluid (mô tả): Chiếm toàn bộ chiều rộng của màn hình -->
    <div class="container-fluid">Nội dung</div>

    <!-- Grid System (mô tả): container -> row -> col -->
    <br />
    <div class="container">
      <div class="row">
        <div class="col-6">Column 1</div>
        <div class="col-6">Column 2</div>
      </div>
    </div>

    <!-- ULTILITY CLASSSES
    1. Margin
    - mt-5: margin-top: 5rem;
    - mb-5: margin-bottom: 5rem;
    - ms-5: margin-left (start): 5rem;
    - me-5: margin-right (end): 5rem;
    - mx-5: margin-left và margin-right: 5rem;
    - my-5: margin-top và margin-bottom: 5rem;
    - m-5: margin tất cả các hướng: 5rem;

    2. Padding (tương tự như margin nhưng là khoảng cách bên trong phần tử)
    - pt-5: padding-top: 5rem;

    3. Background Colors
    - bg-primary: background màu xanh dương
    - bg-secondary: background màu xám 
    - bg-success: background màu xanh lá cây
    - bg-danger: background màu đỏ
    - bg-warning: background màu vàng
    - bg-info: background màu xanh da trời
    - bg-light: background màu sáng
    - bg-dark: background màu tối

    4. Text Colors (tương tự như background colors nhưng áp dụng cho màu chữ)
    - text-primary: text màu xanh dương

    5. Text Alignment
    - text-start: căn trái
    - text-center: căn giữa
    - text-end: căn phải
    - text-justify: căn đều hai bên
    - text-nowrap: không cho phép xuống dòng
    - text-truncate: cắt bớt văn bản nếu nó quá dài và hiển thị dấu "..."
    - text-break: cho phép văn bản xuống dòng nếu nó quá dài
    - text-lowercase: chuyển đổi văn bản thành chữ thường
    - text-uppercase: chuyển đổi văn bản thành chữ hoa
    - text-capitalize: chuyển đổi văn bản thành chữ hoa đầu mỗi từ

    6. Font Weight và Font Style
    - fw-bold: font-weight: bold;
    - fw-normal: font-weight: normal;
    - fw-light: font-weight: light;
    - fw-lighter: font-weight: lighter;
    - fw-bolder: font-weight: bolder;
    - fst-italic: font-style: italic;
    - fst-normal: font-style: normal;

    7. Display
    - d-none: ẩn phần tử
    - d-block: hiển thị phần tử dưới dạng block
    - d-inline: hiển thị phần tử dưới dạng inline
    - d-inline-block: hiển thị phần tử dưới dạng inline-block
    - d-flex: hiển thị phần tử dưới dạng flexbox
    - d-inline-flex: hiển thị phần tử dưới dạng inline-flex
    - d-grid: hiển thị phần tử dưới dạng grid
    - d-inline-grid: hiển thị phần tử dưới dạng inline-grid
    - d-table: hiển thị phần tử dưới dạng table
    - d-table-row: hiển thị phần tử dưới dạng table-row
    - d-table-cell: hiển thị phần tử dưới dạng table-cell

    8. Flex Utilities
    - flex-row: sắp xếp phần tử con theo hàng
    - flex-column: sắp xếp phần tử con theo cột
    - justify-content-start: căn lề trái
    - justify-content-center: căn giữa
    - justify-content-end: căn lề phải
    - justify-content-between: căn đều hai bên
    - justify-content-around: căn đều xung quanh

    9. Visibility
    - visible: phần tử hiển thị
    - invisible: phần tử vẫn chiếm không gian nhưng không hiển thị

    10. Button Classes (tương tự như background colors nhưng áp dụng cho nút)
    - btn: lớp cơ bản cho tất cả các nút

    11. Break points (điểm ngắt): xs, sm, md, lg, xl, xxl
    - col-sm: Kích thước nhỏ (≥576px)
    - col-md: Kích thước trung bình (≥768px)
    - col-lg: Kích thước lớn (≥992px)
    - col-xl: Kích thước rất lớn (≥1200px)
    vd: col-sm-6: chiếm 6/12 cột trên màn hình có kích thước nhỏ trở lên
    -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
